name: YouTube Revenge Wife Digest

on:
  schedule:
    - cron: "0 5 * * *"

  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days back to search (default: 7)"
        required: false
        default: "7"
      min_views:
        description: "Minimum views (default: 5000)"
        required: false
        default: "5000"
      min_ratio:
        description: "Minimum ratio views/subs (default: 5)"
        required: false
        default: "5"

jobs:
  send-digest:
    name: Fetch & Send Digest
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run digest
        env:
          YOUTUBE_API_KEY:    ${{ secrets.YOUTUBE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:        ${{ github.repository }}
          LOOKBACK_DAYS:      ${{ github.event.inputs.lookback_days || '7' }}
          MIN_VIEWS:          ${{ github.event.inputs.min_views || '5000' }}
          MIN_RATIO:          ${{ github.event.inputs.min_ratio || '5' }}
        run: python digestwife.py
